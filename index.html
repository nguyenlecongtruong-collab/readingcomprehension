<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Comprehension - @truonggcong</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #ffedd5; /* Cam nhạt Sunset */
            color: #1e293b;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- MODAL NHẬP THÔNG TIN --- */
        #info-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 41, 59, 0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: #fff; padding: 40px; border: 4px solid #1e293b;
            box-shadow: 10px 10px 0px #fb923c; border-radius: 15px;
            text-align: center; max-width: 450px; width: 90%;
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 3px solid #1e293b; border-radius: 8px; font-family: inherit; font-size: 16px;
        }

        /* --- ĐỒNG HỒ & NHẠC --- */
        #timer-box {
            position: fixed; top: 20px; left: 20px;
            background: #fff; border: 3px solid #1e293b;
            padding: 10px 20px; font-weight: bold; font-size: 18px;
            box-shadow: 4px 4px 0px #fb923c; z-index: 100; border-radius: 8px;
        }
        #music-player {
            position: fixed; bottom: 20px; right: 20px;
            border: 3px solid #1e293b; box-shadow: 4px 4px 0px #1e293b;
            border-radius: 8px; z-index: 100; display: none; background: #fff; height: 80px; overflow: hidden;
        }

        /* --- KHUNG CHÍNH --- */
        .container {
            background-color: #fff; max-width: 1000px; width: 95%;
            border: 4px solid #1e293b; box-shadow: 12px 12px 0px #6366f1;
            border-radius: 12px; padding: 30px; display: none; margin: 60px 0;
        }

        .header h1 { color: #4338ca; text-align: center; margin: 0; font-size: 28px; text-transform: uppercase; }
        .header p { text-align: center; color: #64748b; font-weight: bold; margin-bottom: 25px; }

        .passage-box {
            background: #fdf2f8; border: 3px solid #1e293b;
            padding: 30px; border-radius: 10px; font-size: 18px;
            line-height: 1.8; margin-bottom: 35px; text-align: justify;
        }
        
        .question-item {
            margin-bottom: 35px; border-bottom: 2px dashed #e2e8f0; padding-bottom: 25px;
        }
        .q-title { font-weight: bold; margin-bottom: 15px; color: #4338ca; font-size: 19px; }
        
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        .opt-btn {
            padding: 15px; background: #fff; border: 2px solid #1e293b;
            border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 16px;
            text-align: left; transition: 0.2s;
        }
        .opt-btn:hover:not(:disabled) { background: #e0e7ff; transform: translateX(5px); }
        .opt-btn.selected { background: #c7d2fe; border-color: #4338ca; border-width: 3px; }
        
        /* Kết quả */
        .correct { background: #4ade80 !important; color: #fff; border-color: #166534; }
        .incorrect { background: #f87171 !important; color: #fff; border-color: #991b1b; }

        .explanation {
            margin-top: 15px; padding: 15px; background: #f0fdf4;
            border-left: 5px solid #22c55e; border-radius: 4px;
            font-size: 15px; display: none; line-height: 1.6;
        }

        .btn-group { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        
        button.action-btn {
            width: 100%; padding: 18px; border: none; border-radius: 8px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            font-family: inherit; transition: 0.3s;
        }
        #submit-btn { background: #4338ca; color: #fff; box-shadow: 4px 4px 0px #1e293b; }
        #next-btn { background: #10b981; color: #fff; box-shadow: 4px 4px 0px #1e293b; display: none; }
        button.action-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #1e293b; }

        u { text-decoration: underline; font-weight: bold; color: #4338ca; }
    </style>
</head>
<body>

    <div id="timer-box">Time: 00:00</div>
    <div id="music-player"><iframe id="yt-iframe" width="250" height="80" src="" frameborder="0" allow="autoplay"></iframe></div>

    <div id="info-modal">
        <div class="modal-content">
            <h2 style="color: #4338ca;">READING COMPREHENSION 📖</h2>
            <p>Em hãy đọc kỹ các đoạn văn và trả lời câu hỏi của <b>@truonggcong</b> nhé!</p>
            <input type="text" id="student-name" placeholder="Họ và Tên của em..." autocomplete="off">
            <input type="text" id="student-class" placeholder="Lớp (Ví dụ: 11A8)" autocomplete="off">
            <button onclick="startQuiz()" style="width:100%; padding:15px; background:#4338ca; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">BẮT ĐẦU LÀM BÀI</button>
        </div>
    </div>

    <div class="container" id="main-container">
        <div class="header">
            <h1>Revision For Final Exam</h1>
            <p id="display-info"></p>
        </div>

        <div id="quiz-content">
            <h3 id="passage-title" style="color: #4338ca; border-bottom: 2px solid #4338ca; display: inline-block;"></h3>
            <div class="passage-box" id="passage-text"></div>
            
            <div id="questions-area"></div>
            
            <div class="btn-group">
                <button id="submit-btn" class="action-btn" onclick="submitPassage()">NỘP BÀI ĐOẠN NÀY & XEM GIẢI THÍCH 📋</button>
                <button id="next-btn" class="action-btn" onclick="nextPassage()">QUA ĐOẠN TIẾP THEO 🚀</button>
            </div>
        </div>

        <div id="finish-screen" style="display:none; text-align:center;">
            <h2 style="color: #4338ca; font-size: 36px;">🎉 HOÀN THÀNH RỒI! 🎉</h2>
            <p style="font-size: 18px;">Kết quả của em đã được lưu lại. Chúc em có một kỳ thi rực rỡ!</p>
            <p id="total-time-display" style="font-weight:bold; font-size:24px; color:#10b981;"></p>
            <button onclick="location.reload()" style="background:#1e293b; color:#fff; width: auto; padding: 15px 40px;" class="action-btn">LÀM LẠI</button>
        </div>
    </div>

<script>
    const scriptURL = 'DÁN_LINK_WEB_APP_CỦA_BÀ_VÀO_ĐÂY';
    let studentData = { name: "", className: "", startTime: "", endTime: "" };
    let startTimeObj, timerInterval, currentPassageIdx = 0;
    let selections = {};

    const passages = [
        {
            title: "Passage 1: The History of Graffiti",
            text: "The first drawings on walls appeared in caves thousands of years ago. Later the Ancient Romans and Greeks wrote their names and protest poems on buildings. Modern graffiti seems to have appeared in Philadelphia in the early 1960s, and by the late sixties it had reached New York. The new art form really took off in the 1970s, when people began writing their names, or ‘tags’, on buildings all over the city... Art galleries in New York began buying graffiti in the early seventies... The debate over whether graffiti is art or vandalism is still going on. Peter Vallone thinks that if <u>it</u> is on someone else's property it becomes a crime... graffiti represents freedom and makes cities more <u>vibrant</u>.",
            questions: [
                { q: "1. Which of the following is the best title for this passage?", opts: ["Famous graffiti artists", "Taggers in graffiti", "The future of graffiti", "The history of graffiti"], ans: 3, ex: "Đoạn văn điểm qua từ thời hang động, Hy Lạp cổ đại đến Philadelphia 1960s và New York hiện tại -> Đây là lịch sử của Graffiti." },
                { q: "2. Why was the seventies an important decade in the history of graffiti?", opts: ["That was when the trains were covered in spray paintings.", "That was when graffiti first reached New York.", "That was when modern graffiti first became really popular.", "That was when modern graffiti first appeared."], ans: 2, ex: "Đoạn 1 nói: 'The new art form really took off in the 1970s' (thực sự bùng nổ/trở nên phổ biến)." },
                { q: "3. The word 'it' in paragraph 3 refers to ______________.", opts: ["the debate", "crime", "message", "graffiti"], ans: 3, ex: "Ngữ cảnh: 'if it is on someone else's property' (nếu nó nằm trên tài sản người khác) -> 'nó' ở đây chính là graffiti." },
                { q: "4. Who coined the phrase 'graffiti'?", opts: ["New York gangs", "The mayor of New York", "A newspaper and an author", "The New Yorkers"], ans: 2, ex: "Đoạn 2 ghi: 'the term ‘graffiti’ was first used by The New York Times and the novelist Norman Mailer'." },
                { q: "5. The word 'vibrant' in paragraph 3 is closest in meaning to _______.", opts: ["peaceful", "modern", "full of pictures", "full of energy and life"], ans: 3, ex: "vibrant = full of energy and life: sôi động, rực rỡ sức sống." }
            ]
        },
        {
            title: "Passage 2: Isadora Duncan",
            text: "Modern dance innovator Isadora Duncan (1877–1927) truly moved beyond boundaries... Born in San Francisco... she moved from London to Paris to Berlin in quick succession, performing in salons and achieving success before twenty... after the revolution in Russia she <u>unsurprisingly</u> moved <u>there</u> in 1921... She cited the sea as an early inspiration... insisting that each movement was born from the one preceding it... <u>Her reception was intertwined with the tensions of a woman whose existence brought the dance of the future to the present, when the present wasn’t always ready to fully comprehend her.</u>",
            questions: [
                { q: "1. Which of the following best summarises the passage?", opts: ["Duncan’s personal life influenced her dance.", "Duncan revolutionised dancing with her different political and aesthetic vision.", "Ducan was so weird that nobody accepted her.", "Duncan changed from an active artist to a passive one."], ans: 1, ex: "Bài viết nhấn mạnh Duncan là người đổi mới (innovator), vượt qua ranh giới và cách mạng hóa múa hiện đại." },
                { q: "2. The word 'unsurprisingly' is OPPOSITE in meaning to _______.", opts: ["astonishingly", "obviously", "expectedly", "previously"], ans: 0, ex: "unsurprisingly (không bất ngờ) trái nghĩa với astonishingly (kinh ngạc, vô cùng bất ngờ)." },
                { q: "3. Isadora Duncan achieved her early acclaim in different cities by _______.", opts: ["teaching in dancing schools", "performing in salons", "working in politics", "founding a school"], ans: 1, ex: "Đoạn 1: 'performing in salons and achieving success before the age of twenty'." },
                { q: "4. The word 'intertwined' is SIMILAR in meaning to ______.", opts: ["misunderstood", "closely related", "simplified", "poorly expressed"], ans: 1, ex: "intertwined = closely related: gắn bó chặt chẽ, quấn quýt vào nhau." },
                { q: "5. Which of the following is NOT true about Isadora Duncan?", opts: ["She established a school for working-class children.", "She died from an accident in France.", "She was considered the creator of modern dance.", "She believed in the independence of each movement in dancing."], ans: 3, ex: "Đoạn 1 nói cô ấy tin mỗi động tác sinh ra từ cái TRƯỚC nó (nối tiếp nhau), không phải độc lập (independence)." },
                { q: "6. Which can be inferred from the underlined sentence?", opts: ["Duncan was ready for revolution despite tensions.", "Duncan could not understand future dancing.", "Duncan had relevant ideas but could not understand present dancing.", "Duncan experienced tensions because she was not fully understood at that time."], ans: 3, ex: "Câu gạch chân nói về việc 'hiện tại không luôn sẵn sàng hiểu cô ấy' -> Cô ấy gặp căng thẳng vì không được thấu hiểu." },
                { q: "7. What inspired Duncan’s early movement?", opts: ["other artists’ movements", "vision", "sea", "stage"], ans: 2, ex: "Đoạn 1: 'She cited the sea as an early inspiration for her movement'." },
                { q: "8. The word 'there' refers to ______.", opts: ["Russia", "Germany", "U.S.", "London"], ans: 0, ex: "Câu trước nhắc tới 'the revolution in Russia', câu sau nói 'moved there' -> Russia." }
            ]
        }
    ];

    function startQuiz() {
        const n = document.getElementById('student-name').value.trim();
        const c = document.getElementById('student-class').value.trim();
        if(!n || !c) return alert("Nhập đủ thông tin mới 'múa' được bà ơi!");
        studentData.name = n; studentData.className = c;
        studentData.startTime = new Date().toLocaleString('vi-VN');
        startTimeObj = new Date();
        document.getElementById('info-modal').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
        document.getElementById('display-info').innerText = `Học sinh: ${n} | Lớp: ${c}`;
        document.getElementById('music-player').style.display = 'block';
        document.getElementById('yt-iframe').src = "https://www.youtube.com/embed/5qap5aO4i9A?autoplay=1";
        startTimer(); loadPassage();
    }

    function startTimer() { timerInterval = setInterval(() => { const diff = Math.floor((new Date() - startTimeObj) / 1000); const m = Math.floor(diff / 60).toString().padStart(2, '0'); const s = (diff % 60).toString().padStart(2, '0'); document.getElementById('timer-box').innerText = `Time: ${m}:${s}`; }, 1000); }

    function loadPassage() {
        const p = passages[currentPassageIdx];
        selections = {};
        document.getElementById('passage-title').innerText = p.title;
        document.getElementById('passage-text').innerHTML = p.text;
        const qArea = document.getElementById('questions-area');
        qArea.innerHTML = "";
        
        p.questions.forEach((q, qIdx) => {
            const div = document.createElement('div');
            div.className = 'question-item';
            div.innerHTML = `<div class="q-title">${q.q}</div><div class="options-grid" id="opts-${qIdx}"></div><div class="explanation" id="ex-${qIdx}"></div>`;
            qArea.appendChild(div);
            const optCont = document.getElementById(`opts-${qIdx}`);
            q.opts.forEach((opt, oIdx) => {
                const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.id = `btn-${qIdx}-${oIdx}`;
                btn.innerText = String.fromCharCode(65 + oIdx) + ". " + opt;
                btn.onclick = () => {
                    const family = optCont.querySelectorAll('.opt-btn');
                    family.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected'); selections[qIdx] = oIdx;
                };
                optCont.appendChild(btn);
            });
        });
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function submitPassage() {
        const p = passages[currentPassageIdx];
        if (Object.keys(selections).length < p.questions.length) return alert("Còn câu chưa làm kìa bé ơi!");
        
        p.questions.forEach((q, qIdx) => {
            const selected = selections[qIdx];
            const correct = q.ans;
            const btns = document.getElementById(`opts-${qIdx}`).querySelectorAll('.opt-btn');
            btns.forEach(b => b.disabled = true);
            const exBox = document.getElementById(`ex-${qIdx}`);
            exBox.style.display = 'block';
            exBox.innerHTML = `<b>Giải thích:</b> ${q.ex}`;
            if (selected === correct) document.getElementById(`btn-${qIdx}-${selected}`).classList.add('correct');
            else {
                document.getElementById(`btn-${qIdx}-${selected}`).classList.add('incorrect');
                document.getElementById(`btn-${qIdx}-${correct}`).classList.add('correct');
            }
        });
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextPassage() {
        currentPassageIdx++;
        if(currentPassageIdx < passages.length) loadPassage();
        else finish();
    }

    function finish() {
        clearInterval(timerInterval); studentData.endTime = new Date().toLocaleString('vi-VN');
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('finish-screen').style.display = 'block';
        document.getElementById('total-time-display').innerText = `Tổng thời gian: ${document.getElementById('timer-box').innerText.replace("Time: ","")}`;
        document.getElementById('music-player').style.display = 'none';
        if(scriptURL !== 'DÁN_LINK_WEB_APP_CỦA_BÀ_VÀO_ĐÂY') fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(studentData) });
    }
</script>
</body>
</html>
